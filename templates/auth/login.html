{% extends 'base.html' %}
{% block title %}Login - CareerAssistant{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>CareerAssistant</h1>
      <p>Your personal job search companion</p>
    </div>
    <div class="card">
      <div class="card-body">
        <h2 class="card-title mb-3">Log In</h2>
        <form method="POST">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;font-size:14px;">
              <input type="checkbox" name="remember"> Remember me
            </label>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Log In</button>
        </form>
        <p class="mt-3 text-muted" style="text-align:center;">
          Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
