{% extends 'base.html' %}
{% block title %}Sign Up - CareerAssistant{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>CareerAssistant</h1>
      <p>Track, analyze, and win your job search</p>
    </div>
    <div class="card">
      <div class="card-body">
        <h2 class="card-title mb-3">Create Account</h2>
        <form method="POST">
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="Optional">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Create Account</button>
        </form>
        <p class="mt-3 text-muted" style="text-align:center;">
          Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
